  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f1a;
      --surface:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
      --text-hi:    #f0f2ff;
      --text-lo:    #8890b0;
      --accent:     #6366f1;        /* indigo */
      --accent-2:   #a78bfa;        /* violet */
      --accent-glow:rgba(99,102,241,0.25);
      --radius:     14px;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-hi);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      /* layered radial glow background */
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(167,139,250,0.10) 0%, transparent 60%);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 32px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 24px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(99,102,241,0.08);

      /* entrance animation */
      opacity: 0;
      transform: translateY(24px);
      animation: rise 0.6s 0.1s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes rise {
      to { opacity:1; transform:translateY(0); }
    }

    /* ── Avatar ring ── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar-ring {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), #06b6d4, var(--accent));
      background-size: 300% 300%;
      animation: spin-gradient 4s linear infinite;
    }

    @keyframes spin-gradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1e2040 0%, #141627 100%);
      color: var(--accent-2);
      user-select: none;
    }

    /* ── Profile text ── */
    .profile { text-align: center; margin-bottom: 28px; }

    .name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text-hi);
      margin-bottom: 6px;
    }

    .title {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent-2);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .bio {
      font-size: 0.875rem;
      color: var(--text-lo);
      line-height: 1.65;
      max-width: 320px;
      margin: 0 auto;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Link buttons ── */
    .links { display: flex; flex-direction: column; gap: 11px; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-hi);
      text-decoration: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-glow, transparent);
      opacity: 0;
      transition: opacity var(--transition);
      border-radius: var(--radius);
    }

    .link-btn:hover::before { opacity: 1; }

    .link-btn:hover {
      border-color: var(--btn-accent, var(--accent));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--btn-accent, var(--accent)), 0 0 20px var(--btn-shadow, var(--accent-glow));
    }

    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      background: var(--icon-bg, rgba(99,102,241,0.15));
      color: var(--icon-color, var(--accent-2));
      transition: background var(--transition);
    }

    .link-btn .label { flex: 1; }

    .link-btn .arrow {
      font-size: 0.75rem;
      color: var(--text-lo);
      transition: transform var(--transition), color var(--transition);
    }
    .link-btn:hover .arrow { transform: translateX(3px); color: var(--text-hi); }

    /* Copy button extra */
    .copy-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-lo);
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.14); color: var(--text-hi); }
    .copy-btn.copied { color: #4ade80; border-color: rgba(74,222,128,0.3); }

    /* Per-platform accent colours */
    .btn-instagram {
      --btn-accent: #e1306c;
      --btn-glow: linear-gradient(90deg, rgba(225,48,108,0.06), transparent);
      --btn-shadow: rgba(225,48,108,0.2);
      --icon-bg: rgba(225,48,108,0.12);
      --icon-color: #f06292;
    }
    .btn-telegram {
      --btn-accent: #2aabee;
      --btn-glow: linear-gradient(90deg, rgba(42,171,238,0.06), transparent);
      --btn-shadow: rgba(42,171,238,0.2);
      --icon-bg: rgba(42,171,238,0.12);
      --icon-color: #60c8f8;
    }
    .btn-email {
      --btn-accent: var(--accent);
      --btn-glow: linear-gradient(90deg, rgba(99,102,241,0.06), transparent);
      --btn-shadow: var(--accent-glow);
      --icon-bg: rgba(99,102,241,0.12);
      --icon-color: var(--accent-2);
    }
    .btn-phone {
      --btn-accent: #34d399;
      --btn-glow: linear-gradient(90deg, rgba(52,211,153,0.06), transparent);
      --btn-shadow: rgba(52,211,153,0.2);
      --icon-bg: rgba(52,211,153,0.12);
      --icon-color: #6ee7b7;
    }
    .btn-linkedin {
      --btn-accent: #0a66c2;
      --btn-glow: linear-gradient(90deg, rgba(10,102,194,0.08), transparent);
      --btn-shadow: rgba(10,102,194,0.25);
      --icon-bg: rgba(10,102,194,0.14);
      --icon-color: #60a5fa;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-lo);
      letter-spacing: 0.2px;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity:1; transform:none; }
      .avatar-ring { animation: none; }
      .link-btn { transition: none; }
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      body { padding: 24px 16px 48px; }
      .card { padding: 36px 22px 32px; border-radius: 20px; }
      .name { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<main class="card" role="main">

  <!-- Avatar -->
  <div class="avatar-wrap" aria-hidden="true">
    <div class="avatar-ring">
      <div class="avatar-inner">DM</div>
    </div>
  </div>

  <!-- Profile -->
  <header class="profile">
    <h1 class="name">Diyorbek Mirmukhammadov</h1>
  </header>

  <div class="divider" role="separator"></div>

  <!-- Links -->
  <nav class="links" aria-label="Social links">

    <!-- Instagram -->
    <a class="link-btn btn-instagram" href="https://instagram.com/mirmukhammadov" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <span class="icon"><i class="fab fa-instagram" aria-hidden="true"></i></span>
      <span class="label">Instagram</span>
      <span class="arrow"><i class="fas fa-arrow-right" aria-hidden="true"></i></span>
    </a>

    <!-- Telegram -->
    <a class="link-btn btn-telegram" href="https://t.me/mirmukhammadov" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
      <span class="icon"><i class="fab fa-telegram" aria-hidden="true"></i></span>
      <span class="label">Telegram</span>
      <span class="arrow"><i class="fas fa-arrow-right" aria-hidden="true"></i></span>
    </a>

<!-- Email with copy -->
    <a class="link-btn btn-email" href="mailto:dmirmahamadov@gmail.com" aria-label="Send email to dmirmahamadov@gmail.com">
      <span class="icon"><i class="fas fa-envelope" aria-hidden="true"></i></span>
      <span class="label">dmirmahamadov@gmail.com</span>
    </a>

    <!-- Phone with copy -->
    <a class="link-btn btn-phone" href="tel:+998909352002" aria-label="Call +998909352002">
      <span class="icon"><i class="fas fa-phone" aria-hidden="true"></i></span>
      <span class="label">+998 90 935 20 02</span>
    </a>

    <!-- LinkedIn -->
    <a class="link-btn btn-linkedin" href="https://www.linkedin.com/in/diyorbekmirmukhammadov" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
      <span class="icon"><i class="fab fa-linkedin-in" aria-hidden="true"></i></span>

  </nav>

<footer class="footer" aria-label="Footer">
  Made with <span aria-label="love">❤️</span> by Diyorbek
</footer>

<script>
  // ── Copy to clipboard ──
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const text = btn.dataset.copy;
      try {
        await navigator.clipboard.writeText(text);
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 2000);
      } catch {
        // Fallback for older browsers / HTTP contexts
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }
    });
  });

  // ── Staggered link entrance ──
  document.querySelectorAll('.link-btn').forEach((btn, i) => {
    btn.style.opacity = '0';
    btn.style.transform = 'translateY(12px)';
    setTimeout(() => {
      btn.style.transition = 'opacity 0.4s ease, transform 0.4s ease, background 0.22s cubic-bezier(0.4,0,0.2,1), border-color 0.22s cubic-bezier(0.4,0,0.2,1), box-shadow 0.22s cubic-bezier(0.4,0,0.2,1)';
      btn.style.opacity = '1';
      btn.style.transform = 'translateY(0)';
    }, 500 + i * 80);
  });
</script>

</body>
</html>
